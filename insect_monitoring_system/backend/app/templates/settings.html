<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="settings">Settings - Smart Farming Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <h2><i class="fas fa-leaf"></i> SmartFarm</h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-link" data-page="dashboard">
                    <i class="fas fa-seedling"></i>
                    <span data-i18n="dashboardNav">Dashboard</span>
                </a>
                <a href="#" class="nav-link" data-page="profile">
                    <i class="fas fa-user"></i>
                    <span data-i18n="profileNav">Profile</span>
                </a>
                <a href="#" class="nav-link active" data-page="settings">
                    <i class="fas fa-cog"></i>
                    <span data-i18n="settingsNav">Settings</span>
                </a>
                <a href="#" class="nav-link" id="logout-link">
                    <i class="fas fa-sign-out-alt"></i>
                    <span data-i18n="logout">Logout</span>
                </a>
            </nav>
            <div class="tip-card">
                <h4><i class="fas fa-lightbulb"></i> <span data-i18n="tipOfDay">Tip of the Day</span></h4>
                <p id="daily-tip" data-i18n="waterTip">Water your crops early in the morning to reduce evaporation loss.</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <h1 data-i18n="settings">Settings</h1>
                <div class="user-summary">
                    <span data-i18n="farmer">Farmer</span>: <strong id="username">Farmer</strong>
                    <div class="weather-widget">
                        <i class="fas fa-sun"></i>
                        <span>24°C, Sunny</span>
                    </div>
                </div>
            </header>

            <!-- Settings Content -->
            <section class="dashboard-content">
                <div class="section-card">
                    <h2><i class="fas fa-cog"></i> <span data-i18n="applicationSettings">Application Settings</span></h2>
                    
                    <div id="settings-message" class="message" hidden></div>
                    
                    <form id="settings-form" class="crop-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>
                                    <input type="checkbox" id="notifications" name="notifications">
                                    <i class="fas fa-bell"></i> <span data-i18n="enableNotifications">Enable Notifications</span>
                                </label>
                            </div>
                            
                            <div class="form-group">
                                <label>
                                    <input type="checkbox" id="email-alerts" name="email_alerts">
                                    <i class="fas fa-envelope"></i> <span data-i18n="emailAlerts">Email Alerts</span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label>
                                    <input type="checkbox" id="sms-alerts" name="sms_alerts">
                                    <i class="fas fa-sms"></i> <span data-i18n="smsAlerts">SMS Alerts</span>
                                </label>
                            </div>
                            
                            <div class="form-group">
                                <label for="language"><i class="fas fa-language"></i> <span data-i18n="language">Language</span></label>
                                <select id="language" name="language">
                                    <option value="en" data-i18n="english">English</option>
                                    <option value="mr" data-i18n="marathi">Marathi</option>
                                    <option value="hi" data-i18n="hindi">Hindi</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="theme"><i class="fas fa-moon"></i> <span data-i18n="theme">Theme</span></label>
                                <select id="theme" name="theme">
                                    <option value="light" data-i18n="light">Light</option>
                                    <option value="dark" data-i18n="dark">Dark</option>
                                </select>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-save"></i> <span data-i18n="saveSettings">Save Settings</span>
                        </button>
                    </form>
                </div>
            </section>
        </main>
    </div>
    
    <script src="{{ url_for('static', filename='js/theme-manager.js') }}"></script>
    <script src="{{ url_for('static', filename='js/translations.js') }}"></script>
    <script src="{{ url_for('static', filename='js/navigation.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const settingsForm = document.getElementById('settings-form');
            const messageElement = document.getElementById('settings-message');
            const usernameElement = document.getElementById('username');
            
            // Load user profile and settings
            loadUserProfile();
            loadSettings();
            
            // Handle settings form submission
            if (settingsForm) {
                settingsForm.addEventListener('submit', handleSettingsUpdate);
            }
            
            // Set active nav link
            document.querySelector('.nav-link[data-page="settings"]').classList.add('active');
            
            // Load user profile
            async function loadUserProfile() {
                try {
                    const response = await fetch('/api/profile');
                    if (response.ok) {
                        const user = await response.json();
                        if (usernameElement) {
                            usernameElement.textContent = user.username;
                        }
                    } else {
                        // Redirect to login if not authenticated
                        window.location.href = '/login';
                    }
                } catch (error) {
                    console.error('Error loading user profile:', error);
                }
            }
            
            // Load settings
            async function loadSettings() {
                try {
                    const response = await fetch('/api/settings');
                    if (response.ok) {
                        const settings = await response.json();
                        document.getElementById('notifications').checked = settings.notifications;
                        document.getElementById('email-alerts').checked = settings.email_alerts;
                        document.getElementById('sms-alerts').checked = settings.sms_alerts;
                        document.getElementById('language').value = settings.language;
                        document.getElementById('theme').value = settings.theme;
                        
                        // Apply translations
                        if (typeof translations !== 'undefined') {
                            translations.applyTranslations(settings.language);
                        }
                    } else {
                        // Redirect to login if not authenticated
                        window.location.href = '/login';
                    }
                } catch (error) {
                    console.error('Error loading settings:', error);
                    showMessage('Error loading settings', 'error');
                }
            }
            
            // Handle settings update
            async function handleSettingsUpdate(event) {
                event.preventDefault();
                
                const settingsData = {
                    notifications: document.getElementById('notifications').checked,
                    email_alerts: document.getElementById('email-alerts').checked,
                    sms_alerts: document.getElementById('sms-alerts').checked,
                    language: document.getElementById('language').value,
                    theme: document.getElementById('theme').value
                };
                
                try {
                    const response = await fetch('/api/settings', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(settingsData)
                    });
                    
                    let data = null;
                    try {
                        data = await response.json();
                    } catch (e) {
                        // Non-JSON response
                        data = null;
                    }

                    if (response.ok) {
                        showMessage((data && data.message) ? data.message : 'Settings updated successfully', 'success');
                        // Apply theme if changed
                        if (typeof themeManager !== 'undefined') {
                            themeManager.applyTheme(settingsData.theme);
                            themeManager.saveThemePreference(settingsData.theme);
                        }
                        
                        // Apply language if changed
                        if (typeof translations !== 'undefined') {
                            translations.applyTranslations(settingsData.language);
                            // Store language preference in localStorage and i18next key for SPA sync
                            try {
                                localStorage.setItem('language', settingsData.language);
                                localStorage.setItem('i18nextLng', settingsData.language);
                            } catch (e) { /* ignore */ }
                            // Reload the page to apply translations to all elements
                            setTimeout(() => {
                                location.reload();
                            }, 800);
                        }
                    } else {
                        // Prefer server-provided error message, fall back to generic
                        const errMsg = (data && (data.error || data.message)) ? (data.error || data.message) : 'Failed to update settings';
                        showMessage(errMsg, 'error');
                    }
                } catch (error) {
                    console.error('Error updating settings:', error);
                    // Show network/exception message to help debugging
                    showMessage('Error updating settings. Please check your network and try again.', 'error');
                }
            }
            
            // Handle logout
            async function handleLogout(e) {
                e.preventDefault();
                
                try {
                    const response = await fetch('/api/logout', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        window.location.href = '/login';
                    }
                } catch (error) {
                    console.error('Error logging out:', error);
                    window.location.href = '/login';
                }
            }
            
            // Set up navigation
            function setupNavigation() {
                const navLinks = document.querySelectorAll('.nav-link');
                navLinks.forEach(link => {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        
                        // Get the page from data attribute
                        const page = this.getAttribute('data-page');
                        
                        // Handle navigation
                        if (page === 'profile') {
                            window.location.href = '/profile';
                        } else if (page === 'settings') {
                            window.location.href = '/settings';
                        } else if (page === 'dashboard') {
                            window.location.href = '/';
                        }
                    });
                });
            }
            
            // Show message
            function showMessage(message, type) {
                messageElement.textContent = message;
                messageElement.className = 'message ' + type;
                messageElement.style.display = 'block';
                
                // Hide message after 5 seconds
                setTimeout(() => {
                    messageElement.style.display = 'none';
                }, 5000);
            }
        });
    </script>
</body>
</html>
